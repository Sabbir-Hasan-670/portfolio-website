<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Sabbir Hasan</title>
    <meta name="description" content="Read latest articles on cybersecurity, web development, networking, and technology by Sabbir Hasan.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="scroll-progress" id="scrollProgress"></div>

    <div class="aurora-mesh">
        <div class="aurora-blob aurora-blob-1"></div>
        <div class="aurora-blob aurora-blob-2"></div>
        <div class="aurora-blob aurora-blob-3"></div>
    </div>
    <canvas id="starCanvas"></canvas>

    <div class="main-content">
        <nav class="navbar" id="navbar">
            <div class="nav-inner">
                <a href="/#home" class="nav-logo">SH.</a>
                <div class="nav-links" id="navLinks">
                    <a href="/" class="nav-visible-btn">Home</a>
                    <a href="/blog" class="nav-visible-btn" style="color:var(--aurora-1);">Blog</a>
                    <button class="hamburger" id="hamburger" aria-label="Menu">
                        <span></span><span></span><span></span>
                    </button>
                    <div class="nav-menu-dropdown" id="navDropdown">
                        <a href="/#about">About</a>
                        <a href="/#projects">Projects</a>
                        <a href="/#experience">Experience</a>
                        <a href="/#education">Education</a>
                        <a href="/#contact" class="nav-cta">Let's Talk</a>
                    </div>
                </div>
            </div>
        </nav>

        <div class="section" style="padding-top:3rem;">
            <div class="section-header reveal">
                <p class="section-label">Blog</p>
                <h1 class="section-title">Latest <span>Articles</span></h1>
            </div>

            <div class="category-filters" id="categoryFilters">
                <button class="cat-btn active" data-category="all">All</button>
            </div>

            <div class="blog-grid" id="blogGrid">
                <p style="color:var(--text-secondary);">Loading articles...</p>
            </div>

            <div class="pagination" id="pagination">
                <button class="load-more-btn" id="loadMoreBtn" style="display:none;">Load More Posts →</button>
            </div>
        </div>

        <footer class="footer">
            <p>&copy; <span id="year"></span> <a href="/admin/login">Sabbir Hasan</a>. Built with ❤️</p>
        </footer>
    </div>

    <script src="main.js"></script>
<script src="/toast.js"></script></body>
</html>
